<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | DSCLOUD</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page login-page">
    <header class="topbar">
        <div class="brand" role="button" tabindex="0" onclick="window.location.href='/'" onkeydown="if(event.key==='Enter')window.location.href='/'">
            <img class="brand-mark" src="logo.png" alt="DSCLOUD logo" />
            <div>
                <h1>DSCLOUD</h1>
                <p>Fast media hosting with focused tools.</p>
            </div>
        </div>
        <nav>
            <a href="/">Upload</a>
            <a href="text-host.html">Text</a>
            <a href="register.html">Register</a>
            <a href="api-docs.html">API</a>
            <span id="auth-links"></span>
        </nav>
    </header>

    <main class="panel auth-panel">
        <article class="card card-wide">
            <div class="card-header">
                <h3 id="auth-title">Login</h3>
                <p>Use your email and password or continue with Google.</p>
            </div>

            <form id="auth-form" class="simple-form">
                <label class="field-label" for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com" required />

                <label class="field-label" for="password">Password</label>
                <input id="password" type="password" placeholder="Enter password" required />

                <button type="submit" id="auth-submit" class="button primary">Sign in</button>
                <button type="button" id="google-auth-button" class="button secondary">Continue with Google</button>
                <div id="auth-feedback" class="notice" hidden></div>
            </form>

            <p class="auth-footer">New here? <a href="register.html">Create an account</a></p>
        </article>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-copy">&copy; 2026 DSCLOUD. All rights reserved.</div>
            <div class="footer-meta">
                <div class="footer-meta-line">Developed by</div>
                <div class="footer-dev-line">
                    <span class="footer-dev-name">Sanchit</span>
                    <a class="footer-brand" href="https://github.com/sanchit0102/" target="_blank" rel="noopener noreferrer" title="Sanchit on GitHub">
                        <svg viewBox="0 0 16 16" aria-hidden="true">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 018 4.58a7.65 7.65 0 011.99.27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="auth.js"></script>
</body>
</html>
